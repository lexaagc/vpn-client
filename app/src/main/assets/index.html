<!DOCTYPE html><html><body style='background:#111;color:#fff;text-align:center;margin-top:40px;font-family:sans-serif;'><h2>Barsik VPN 😼</h2><input id='link' placeholder='vless://...' style='width:80%;padding:10px;'><br><br><button onclick='connect()' style='padding:15px;font-size:18px;'>CONNECT</button><button onclick='disconnect()' style='padding:15px;font-size:18px;'>DISCONNECT</button><p id='status'>Status: OFF</p><script>function connect(){const l=document.getElementById('link').value;Android.connectVPN(l);document.getElementById('status').innerText='CONNECTING...';}function disconnect(){Android.disconnectVPN();document.getElementById('status').innerText='OFF';}</script></body></html>
